document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>RegulonDB MG — Multi-organism transcriptional regulation<\u002Ftitle>\n  <meta name=\"description\" content=\"Prototype redesign of RegulonDB as a multi-organism platform.\">\n  <style>/* =========================================================================\n   RegulonDB Multi-Organism — Design Tokens\n   Semantic layer on top of the brand palette specified in the brief.\n   All tokens use relative units for type; spacing uses rem multiples.\n   ========================================================================= */\n\n:root {\n  /* ---- Brand palette (from brief) ---- */\n  --blue-1: #1F3D4E;   /* darkest — headers, titles */\n  --blue-2: #32617D;   /* mid-dark — links, primary CTAs */\n  --blue-3: #3D779B;   /* mid — hover, accents */\n  --blue-4: #72A7C7;   /* light — badges, soft highlights */\n  --blue-5: #D5E2EA;   /* very light — section backgrounds, cards */\n\n  --grey-1: #373737;   /* body text */\n  --grey-2: #666666;   /* secondary text */\n  --grey-3: #999999;   /* tertiary, placeholders */\n  --grey-4: #D5D5D7;   /* borders, dividers */\n  --grey-5: #F4F5F5;   /* subtle surface */\n  --rest:   #FFFFFF;   /* canvas */\n\n  --error: #C93A1D;\n  --accent: #C98528;\n  --accent-light: #D2A769;\n  --postit: #FFF8A6;\n\n  /* ---- Semantic surfaces ---- */\n  --surface-canvas: var(--rest);\n  --surface-raised: var(--rest);\n  --surface-sunken: var(--grey-5);\n  --surface-section: var(--blue-5);\n  --surface-note: var(--postit);\n  --surface-header: var(--blue-1);\n\n  /* ---- Semantic text ---- */\n  --text-primary: var(--grey-1);\n  --text-secondary: var(--grey-2);\n  --text-tertiary: var(--grey-3);\n  --text-on-dark: #ffffff;\n  --text-link: var(--blue-2);\n  --text-link-hover: var(--blue-3);\n  --text-title: var(--blue-1);\n\n  /* ---- Semantic borders ---- */\n  --border-default: var(--grey-4);\n  --border-strong: var(--grey-3);\n  --border-focus: var(--blue-3);\n  --border-subtle: #e8eaec;\n\n  /* ---- Evidence roles ---- */\n  --evidence-curated-bg: #e3ecf2;\n  --evidence-curated-fg: var(--blue-2);\n  --evidence-predicted-bg: #f6ead7;\n  --evidence-predicted-fg: #8a5a15;\n  --evidence-ht-bg: #e8e1ef;\n  --evidence-ht-fg: #5a3b86;\n  --evidence-weak-bg: #fde8e4;\n  --evidence-weak-fg: var(--error);\n\n  /* ---- Object-type accents (consistent iconography color) ---- */\n  --obj-gene: #2f6b48;\n  --obj-operon: #7a4a1e;\n  --obj-tf: #6b2f64;\n  --obj-regulon: #1a4d6b;\n  --obj-promoter: #a14522;\n  --obj-dataset: #3d4a7a;\n\n  /* ---- Typography ---- */\n  --font-sans: Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --font-serif: \"Times New Roman\", Times, serif;\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Type scale — relative (brief requires no hard px for type).\n     Base = 16px in browsers; these follow the spec sizes as rem. */\n  --fs-h1: 1.5rem;     /* 24 */\n  --fs-h2: 1.375rem;   /* 22 */\n  --fs-h3: 1.25rem;    /* 20 */\n  --fs-h4: 1.125rem;   /* 18 */\n  --fs-body-lg: 1rem;    /* 16 — \"relevant text\" */\n  --fs-body: 0.875rem;   /* 14 — \"normal text\" */\n  --fs-small: 0.8125rem; /* 13 */\n  --fs-micro: 0.75rem;   /* 12 — micro-labels only, not body */\n\n  --lh-tight: 1.25;\n  --lh-normal: 1.5;\n  --lh-loose: 1.7;\n\n  /* ---- Spacing (4/8 base) ---- */\n  --sp-1: 0.25rem;\n  --sp-2: 0.5rem;\n  --sp-3: 0.75rem;\n  --sp-4: 1rem;\n  --sp-5: 1.25rem;\n  --sp-6: 1.5rem;\n  --sp-7: 2rem;\n  --sp-8: 2.5rem;\n  --sp-9: 3rem;\n  --sp-10: 4rem;\n\n  /* ---- Radii ---- */\n  --radius-sm: 3px;\n  --radius-md: 6px;\n  --radius-lg: 10px;\n  --radius-pill: 999px;\n\n  /* ---- Shadows (restrained, scientific) ---- */\n  --shadow-1: 0 1px 2px rgba(31, 61, 78, 0.06);\n  --shadow-2: 0 2px 6px rgba(31, 61, 78, 0.10);\n  --shadow-3: 0 8px 24px rgba(31, 61, 78, 0.14);\n\n  /* ---- Layout ---- */\n  --container-max: 1400px;\n  --header-height: 56px;\n  --subheader-height: 44px;\n  --rail-width: 220px;\n  --transition-fast: 120ms ease;\n  --transition-med: 200ms ease;\n\n  /* ---- Focus ring (WCAG AA) ---- */\n  --focus-ring: 0 0 0 2px var(--rest), 0 0 0 4px var(--blue-3);\n}\n\n/* =========================================================================\n   Dark mode — semantic tokens remapped; brand hues preserved via shift\n   ========================================================================= */\n[data-theme=\"dark\"] {\n  --surface-canvas: #0f1b22;\n  --surface-raised: #162731;\n  --surface-sunken: #0b141a;\n  --surface-section: #1a2d38;\n  --surface-note: #4a4721;\n  --surface-header: #0a141a;\n\n  --text-primary: #e6ecef;\n  --text-secondary: #a7b4bb;\n  --text-tertiary: #7a8890;\n  --text-on-dark: #ffffff;\n  --text-link: #9cc5dc;\n  --text-link-hover: #bfdcec;\n  --text-title: #e6ecef;\n\n  --border-default: #2a3d48;\n  --border-strong: #3b5260;\n  --border-subtle: #1e2e38;\n\n  --evidence-curated-bg: #1b2e3a;\n  --evidence-curated-fg: #9cc5dc;\n  --evidence-predicted-bg: #3a2c15;\n  --evidence-predicted-fg: #e3b977;\n  --evidence-ht-bg: #2b2338;\n  --evidence-ht-fg: #c7b0e8;\n  --evidence-weak-bg: #3a1f18;\n  --evidence-weak-fg: #ef7d67;\n\n  --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);\n  --shadow-2: 0 2px 6px rgba(0, 0, 0, 0.5);\n  --shadow-3: 0 8px 24px rgba(0, 0, 0, 0.55);\n}\n\n@media (prefers-color-scheme: dark) {\n  :root:not([data-theme=\"light\"]) {\n    --surface-canvas: #0f1b22;\n    --surface-raised: #162731;\n    --surface-sunken: #0b141a;\n    --surface-section: #1a2d38;\n    --surface-note: #4a4721;\n    --surface-header: #0a141a;\n    --text-primary: #e6ecef;\n    --text-secondary: #a7b4bb;\n    --text-tertiary: #7a8890;\n    --text-link: #9cc5dc;\n    --text-link-hover: #bfdcec;\n    --text-title: #e6ecef;\n    --border-default: #2a3d48;\n    --border-strong: #3b5260;\n    --border-subtle: #1e2e38;\n    --evidence-curated-bg: #1b2e3a;\n    --evidence-curated-fg: #9cc5dc;\n    --evidence-predicted-bg: #3a2c15;\n    --evidence-predicted-fg: #e3b977;\n  }\n}\n<\u002Fstyle>\n  <style>/* =========================================================================\n   RegulonDB MG — Components & Layout\n   ========================================================================= */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--text-primary);\n  background: var(--surface-canvas);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* --- Typography base --- */\nh1, h2, h3, h4 {\n  font-family: var(--font-sans);\n  font-weight: 700;\n  color: var(--text-title);\n  margin: 0;\n  line-height: var(--lh-tight);\n  letter-spacing: -0.005em;\n}\nh1 { font-size: var(--fs-h1); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); }\nh4 { font-size: var(--fs-h4); }\n\np { margin: 0 0 var(--sp-3); }\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n  border-bottom: 1px solid transparent;\n  transition: color var(--transition-fast), border-color var(--transition-fast);\n}\na:hover { color: var(--text-link-hover); border-bottom-color: currentColor; }\na:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: 2px; }\n\nbutton {\n  font-family: inherit;\n  font-size: inherit;\n  cursor: pointer;\n  border: none;\n  background: none;\n  color: inherit;\n}\nbutton:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-md); }\n\n/* Scientific nomenclature helpers */\n.gene, .taxon { font-style: italic; }\n.protein { font-style: normal; }\n.citation { font-family: var(--font-serif); font-style: italic; color: var(--text-secondary); }\n\n/* Skip link */\n.skip-link {\n  position: absolute; left: -9999px; top: 0;\n  background: var(--blue-1); color: #fff; padding: var(--sp-2) var(--sp-4);\n  z-index: 1000; border-radius: 0 0 var(--radius-md) 0;\n}\n.skip-link:focus { left: 0; }\n\n/* =========================================================================\n   HEADER + ORGANISM SELECTOR\n   ========================================================================= */\n.app-header {\n  position: sticky; top: 0; z-index: 50;\n  background: var(--surface-header);\n  color: var(--text-on-dark);\n  border-bottom: 1px solid rgba(255,255,255,0.06);\n}\n.app-header__inner {\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding: 0 var(--sp-5);\n  height: var(--header-height);\n  display: flex; align-items: center; gap: var(--sp-5);\n}\n.brand {\n  display: flex; align-items: center; gap: var(--sp-3);\n  color: #fff;\n  font-weight: 700; font-size: 1.0625rem;\n  letter-spacing: -0.01em;\n  border-bottom: none;\n}\n.brand:hover { color: #fff; border-bottom: none; }\n.brand__mark {\n  width: 30px; height: 30px;\n  background: linear-gradient(135deg, var(--blue-3), var(--blue-4));\n  border-radius: var(--radius-md);\n  display: grid; place-items: center;\n  font-family: var(--font-mono);\n  font-size: 0.875rem; color: #0a141a; font-weight: 700;\n  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);\n}\n.brand__name small {\n  display: block; font-weight: 400; font-size: 0.6875rem;\n  color: var(--blue-4); letter-spacing: 0.04em; text-transform: uppercase;\n  margin-top: -2px;\n}\n\n/* Organism pill in header */\n.org-pill {\n  display: flex; align-items: center; gap: var(--sp-3);\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.14);\n  color: #fff;\n  padding: 0.375rem var(--sp-3) 0.375rem 0.375rem;\n  border-radius: var(--radius-pill);\n  font-size: var(--fs-body);\n  transition: background var(--transition-fast), border-color var(--transition-fast);\n}\n.org-pill:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); }\n.org-pill__avatar {\n  width: 26px; height: 26px; border-radius: 50%;\n  display: grid; place-items: center;\n  font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700;\n  color: #0a141a;\n}\n.org-pill__strain { color: var(--blue-4); margin-left: var(--sp-1); font-size: var(--fs-small); }\n.org-pill__chevron { opacity: 0.7; margin-left: var(--sp-1); }\n\n/* Global search in header */\n.header-search {\n  flex: 1;\n  max-width: 560px;\n  position: relative;\n}\n.header-search input {\n  width: 100%;\n  height: 34px;\n  background: rgba(255,255,255,0.08);\n  border: 1px solid rgba(255,255,255,0.14);\n  color: #fff;\n  padding: 0 var(--sp-3) 0 2.125rem;\n  border-radius: var(--radius-md);\n  font-size: var(--fs-body);\n  font-family: inherit;\n}\n.header-search input::placeholder { color: rgba(255,255,255,0.6); }\n.header-search input:focus {\n  outline: none;\n  background: rgba(255,255,255,0.14);\n  border-color: var(--blue-4);\n}\n.header-search__icon {\n  position: absolute; left: var(--sp-3); top: 50%; transform: translateY(-50%);\n  color: rgba(255,255,255,0.7);\n  pointer-events: none;\n}\n.header-search__kbd {\n  position: absolute; right: var(--sp-2); top: 50%; transform: translateY(-50%);\n  font-family: var(--font-mono); font-size: var(--fs-micro);\n  color: rgba(255,255,255,0.5);\n  border: 1px solid rgba(255,255,255,0.2);\n  border-radius: 3px;\n  padding: 1px 5px;\n}\n\n.header-right { margin-left: auto; display: flex; align-items: center; gap: var(--sp-2); }\n.icon-btn {\n  width: 34px; height: 34px;\n  border-radius: var(--radius-md);\n  display: grid; place-items: center;\n  color: rgba(255,255,255,0.8);\n  transition: background var(--transition-fast), color var(--transition-fast);\n}\n.icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }\n\n/* Primary nav row below header */\n.app-nav {\n  background: var(--surface-raised);\n  border-bottom: 1px solid var(--border-default);\n  position: sticky; top: var(--header-height); z-index: 40;\n}\n.app-nav__inner {\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding: 0 var(--sp-5);\n  height: var(--subheader-height);\n  display: flex; align-items: stretch; gap: 0;\n  overflow-x: auto;\n}\n.app-nav a {\n  display: flex; align-items: center; gap: var(--sp-2);\n  padding: 0 var(--sp-4);\n  font-size: var(--fs-body);\n  color: var(--text-secondary);\n  border-bottom: 2px solid transparent;\n  white-space: nowrap;\n}\n.app-nav a:hover { color: var(--text-primary); border-bottom-color: var(--border-default); }\n.app-nav a.is-active {\n  color: var(--blue-1); border-bottom-color: var(--blue-2);\n  font-weight: 700;\n}\n[data-theme=\"dark\"] .app-nav a.is-active { color: var(--text-primary); border-bottom-color: var(--blue-4); }\n\n/* =========================================================================\n   ORGANISM DRAWER (opened from pill)\n   ========================================================================= */\n.drawer-backdrop {\n  position: fixed; inset: 0;\n  background: rgba(15, 27, 34, 0.5);\n  backdrop-filter: blur(2px);\n  z-index: 100;\n  opacity: 0; pointer-events: none;\n  transition: opacity var(--transition-med);\n}\n.drawer-backdrop.is-open { opacity: 1; pointer-events: auto; }\n\n.drawer {\n  position: fixed; top: 0; right: 0; bottom: 0;\n  width: min(440px, 100vw);\n  background: var(--surface-raised);\n  box-shadow: var(--shadow-3);\n  z-index: 101;\n  transform: translateX(100%);\n  transition: transform var(--transition-med);\n  display: flex; flex-direction: column;\n}\n.drawer.is-open { transform: translateX(0); }\n.drawer__header {\n  padding: var(--sp-5);\n  border-bottom: 1px solid var(--border-default);\n  display: flex; justify-content: space-between; align-items: flex-start; gap: var(--sp-4);\n}\n.drawer__header h2 { font-size: var(--fs-h3); }\n.drawer__header p { font-size: var(--fs-body); color: var(--text-secondary); margin: var(--sp-1) 0 0; }\n.drawer__close {\n  width: 32px; height: 32px; border-radius: var(--radius-md);\n  color: var(--text-secondary);\n}\n.drawer__close:hover { background: var(--surface-sunken); color: var(--text-primary); }\n\n.drawer__search {\n  padding: var(--sp-4) var(--sp-5);\n  border-bottom: 1px solid var(--border-default);\n  position: relative;\n}\n.drawer__search input {\n  width: 100%; height: 36px;\n  padding: 0 var(--sp-3) 0 2.125rem;\n  border: 1px solid var(--border-default);\n  border-radius: var(--radius-md);\n  font-size: var(--fs-body);\n  font-family: inherit;\n  background: var(--surface-sunken);\n  color: var(--text-primary);\n}\n.drawer__search input:focus { outline: none; border-color: var(--blue-3); background: var(--surface-raised); }\n.drawer__search svg {\n  position: absolute; left: calc(var(--sp-5) + var(--sp-3));\n  top: 50%; transform: translateY(-50%);\n  color: var(--text-tertiary);\n}\n\n.drawer__list {\n  flex: 1; overflow-y: auto;\n  padding: var(--sp-3);\n}\n.org-card {\n  display: block;\n  width: 100%;\n  text-align: left;\n  padding: var(--sp-4);\n  border-radius: var(--radius-md);\n  border: 1px solid var(--border-default);\n  background: var(--surface-raised);\n  margin-bottom: var(--sp-3);\n  cursor: pointer;\n  transition: border-color var(--transition-fast), background var(--transition-fast);\n  color: var(--text-primary);\n}\n.org-card:hover { border-color: var(--blue-3); background: var(--surface-sunken); }\n.org-card.is-active { border-color: var(--blue-2); background: var(--surface-section); }\n.org-card__top { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-3); }\n.org-card__avatar {\n  width: 40px; height: 40px; border-radius: 50%;\n  display: grid; place-items: center;\n  font-family: var(--font-mono); font-size: 0.9rem; font-weight: 700; color: #0a141a;\n  flex-shrink: 0;\n}\n.org-card__name {\n  font-weight: 700; color: var(--text-title); font-size: var(--fs-body-lg);\n}\n.org-card__name em { font-style: italic; }\n.org-card__strain { font-size: var(--fs-small); color: var(--text-secondary); }\n.org-card__active-badge {\n  margin-left: auto;\n  font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: 0.05em;\n  color: var(--blue-2); font-weight: 700;\n}\n[data-theme=\"dark\"] .org-card__active-badge { color: var(--blue-4); }\n.org-card__stats {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-2);\n  padding-top: var(--sp-3);\n  border-top: 1px dashed var(--border-default);\n}\n.org-card__stat { text-align: left; }\n.org-card__stat-value {\n  font-family: var(--font-mono); font-size: var(--fs-body); font-weight: 700;\n  color: var(--text-title);\n}\n.org-card__stat-label {\n  font-size: var(--fs-micro); color: var(--text-tertiary);\n  text-transform: uppercase; letter-spacing: 0.04em;\n}\n\n/* =========================================================================\n   LAYOUT HELPERS\n   ========================================================================= */\n.container {\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding: var(--sp-6) var(--sp-5) var(--sp-9);\n}\n\n.breadcrumbs {\n  display: flex; align-items: center; flex-wrap: wrap; gap: var(--sp-1);\n  font-size: var(--fs-small);\n  color: var(--text-secondary);\n  margin-bottom: var(--sp-4);\n}\n.breadcrumbs a { color: var(--text-secondary); border-bottom: none; }\n.breadcrumbs a:hover { color: var(--text-link); }\n.breadcrumbs .sep { color: var(--text-tertiary); margin: 0 var(--sp-1); }\n.breadcrumbs .current { color: var(--text-primary); font-weight: 700; }\n\n/* =========================================================================\n   BADGES & CHIPS\n   ========================================================================= */\n.badge {\n  display: inline-flex; align-items: center; gap: 0.3em;\n  padding: 0.15rem 0.5rem;\n  border-radius: var(--radius-pill);\n  font-size: var(--fs-micro);\n  font-weight: 700;\n  letter-spacing: 0.02em;\n  line-height: 1.4;\n  white-space: nowrap;\n  text-transform: uppercase;\n}\n.badge--curated { background: var(--evidence-curated-bg); color: var(--evidence-curated-fg); }\n.badge--predicted { background: var(--evidence-predicted-bg); color: var(--evidence-predicted-fg); }\n.badge--ht { background: var(--evidence-ht-bg); color: var(--evidence-ht-fg); }\n.badge--weak { background: var(--evidence-weak-bg); color: var(--evidence-weak-fg); }\n.badge--plain {\n  background: var(--surface-sunken); color: var(--text-secondary);\n  border: 1px solid var(--border-default);\n}\n\n.evidence-code {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-family: var(--font-mono);\n  font-size: var(--fs-micro);\n  padding: 1px 5px;\n  background: var(--surface-sunken);\n  border: 1px solid var(--border-default);\n  border-radius: var(--radius-sm);\n  color: var(--text-secondary);\n  cursor: help;\n  text-transform: none;\n}\n\n.obj-tag {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-size: var(--fs-micro);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n.obj-tag::before {\n  content: ''; width: 8px; height: 8px; border-radius: 2px;\n  display: inline-block;\n  background: currentColor;\n}\n.obj-tag--gene { color: var(--obj-gene); }\n.obj-tag--operon { color: var(--obj-operon); }\n.obj-tag--tf { color: var(--obj-tf); }\n.obj-tag--regulon { color: var(--obj-regulon); }\n.obj-tag--promoter { color: var(--obj-promoter); }\n.obj-tag--dataset { color: var(--obj-dataset); }\n\n/* =========================================================================\n   BUTTONS\n   ========================================================================= */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: var(--sp-2);\n  padding: 0.5rem var(--sp-4);\n  border-radius: var(--radius-md);\n  font-size: var(--fs-body);\n  font-weight: 700;\n  font-family: inherit;\n  border: 1px solid transparent;\n  transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);\n  line-height: 1.2;\n}\n.btn--primary { background: var(--blue-2); color: #fff; }\n.btn--primary:hover { background: var(--blue-1); }\n.btn--secondary {\n  background: var(--surface-raised);\n  color: var(--text-link);\n  border-color: var(--border-default);\n}\n.btn--secondary:hover { border-color: var(--blue-3); color: var(--text-link-hover); }\n.btn--ghost {\n  background: transparent; color: var(--text-secondary); border: 1px solid transparent;\n}\n.btn--ghost:hover { background: var(--surface-sunken); color: var(--text-primary); }\n.btn--accent {\n  background: var(--surface-raised); color: var(--accent); border-color: var(--accent-light);\n}\n.btn--accent:hover { background: #fdf4e5; }\n[data-theme=\"dark\"] .btn--accent:hover { background: #2b1f10; }\n.btn--sm { padding: 0.3rem var(--sp-3); font-size: var(--fs-small); }\n\n/* =========================================================================\n   CARDS & PANELS\n   ========================================================================= */\n.card {\n  background: var(--surface-raised);\n  border: 1px solid var(--border-default);\n  border-radius: var(--radius-md);\n  padding: var(--sp-5);\n}\n.card--sunken { background: var(--surface-sunken); }\n.card--section { background: var(--surface-section); border-color: transparent; }\n.card--note { background: var(--surface-note); border-color: #e8d67a; }\n[data-theme=\"dark\"] .card--note { border-color: #6a6430; color: #f1ead0; }\n\n.card__title { font-size: var(--fs-h4); margin-bottom: var(--sp-3); }\n.card__hd {\n  display: flex; justify-content: space-between; align-items: center;\n  margin-bottom: var(--sp-4); gap: var(--sp-3);\n}\n.card__hd h3 { font-size: var(--fs-h4); }\n\n/* key-value list */\n.kv { display: grid; grid-template-columns: 9rem 1fr; gap: var(--sp-2) var(--sp-4); font-size: var(--fs-body); }\n.kv dt { color: var(--text-secondary); font-weight: 400; }\n.kv dd { margin: 0; color: var(--text-primary); }\n\n/* ==================== lor: var(--text-secondary); font-size: var(--fs-body); margin: 0; }\n\n/* =========================================================================\n   GENE / TF / REGULON PAGES\n   ========================================================================= */\n.obj-header {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: var(--sp-5);\n  padding: var(--sp-6);\n  background: var(--surface-raised);\n  border: 1px solid var(--border-default);\n  border-radius: var(--radius-lg);\n  margin-bottom: var(--sp-5);\n  position: relative; overflow: hidden;\n}\n.obj-header::before {\n  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;\n  background: linear-gradient(90deg, var(--blue-2), var(--blue-4));\n}\n.obj-header--gene::before { background: linear-gradient(90deg, var(--obj-gene), #7ab493); }\n.obj-header--tf::before { background: linear-gradient(90deg, var(--obj-tf), #a577a0); }\n.obj-header--regulon::before { background: linear-gradient(90deg, var(--obj-regulon), var(--blue-4)); }\n\n.obj-header__eyebrow {\n  font-size: var(--fs-micro); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;\n  color: var(--text-tertiary);\n  display: flex; align-items: center; gap: var(--sp-2);\n  margin-bottom: var(--sp-2);\n}\n.obj-header h1 { font-size: clamp(1.5rem, 2.4vw, 2rem); margin-bottom: var(--sp-2); }\n.obj-header h1 .gene { color: var(--text-title); }\n.obj-header__tagline { color: var(--text-secondary); font-size: var(--fs-body-lg); max-width: 70ch; }\n.obj-header__meta {\n  display: flex; gap: var(--sp-4); margin-top: var(--sp-4); flex-wrap: wrap;\n  font-size: var(--fs-small);\n}\n.obj-header__meta > div { display: flex; flex-direction: column; gap: 2px; }\n.obj-header__meta span:first-child { color: var(--text-tertiary); text-transform: uppercase; font-size: var(--fs-micro); letter-spacing: 0.05em; }\n.obj-header__meta span:last-child { color: var(--text-primary); font-family: var(--font-mono); }\n.obj-header__actions { display: flex; flex-direction: column; gap: var(--sp-2); align-items: flex-end; }\n\n/* Tabs */\n.tabs {\n  display: flex; gap: 0;\n  border-bottom: 1px solid var(--border-default);\n  margin-bottom: var(--sp-5);\n  overflow-x: auto;\n}\n.tabs button {\n  padding: var(--sp-3) var(--sp-4);\n  font-size: var(--fs-body);\n  color: var(--text-secondary);\n  border-bottom: 2px solid transparent;\n  white-space: nowrap;\n  font-family: inherit;\n}\n.tabs button.is-active {\n  color: var(--blue-1); border-bottom-color: var(--blue-2);\n  font-weight: 700;\n}\n[data-theme=\"dark\"] .tabs button.is-active { color: var(--text-primary); border-bottom-color: var(--blue-4); }\n.tabs button:hover { color: var(--text-primary); }\n\n/* Page two-column (long-scroll variant) */\n.page-2col {\n  display: grid;\n  grid-template-columns: 1fr 280px;\n  gap: var(--sp-6);\n}\n@media (max-width: 1000px) { .page-2col { grid-template-columns: 1fr; } }\n\n.toc {\n  position: sticky; top: calc(var(--header-height) + var(--subheader-height) + var(--sp-3));\n  align-self: start;\n  font-size: var(--fs-small);\n}\n.toc__title {\n  font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: 0.08em;\n  color: var(--text-tertiary); font-weight: 700; margin-bottom: var(--sp-3);\n}\n.toc ul { list-style: none; padding: 0; margin: 0; border-left: 1px solid var(--border-default); }\n.toc li a {\n  display: block; padding: 6px var(--sp-3);\n  color: var(--text-secondary);\n  border-left: 2px solid transparent;\n  margin-left: -1px;\n  border-bottom: none;\n}\n.toc li a:hover { color: var(--text-link); }\n.toc li a.is-active { color: var(--blue-1); border-left-color: var(--blue-2); font-weight: 700; background: var(--surface-section); }\n[data-theme=\"dark\"] .toc li a.is-active { color: var(--text-primary); }\n\n.section-block {\n  margin-bottom: var(--sp-7);\n  scroll-margin-top: calc(var(--header-height) + var(--subheader-height) + var(--sp-4));\n}\n.section-block__hd {\n  display: flex; justify-
